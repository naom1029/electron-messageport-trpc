name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish
        required: true
        default: electron-messageport-trpc-v0.3.0
      expected_version:
        description: Package version expected at the selected ref
        required: true
        default: 0.3.0

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}-${{ inputs.ref || github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      package_release_created: ${{ steps.release.outputs['packages/electron-messageport-trpc--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release

  publish:
    name: Publish to npm
    needs: [release-please]
    if: github.event_name == 'workflow_run' && needs.release-please.outputs.package_release_created == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npm publish --access public
        working-directory: packages/electron-messageport-trpc

  publish-manual:
    name: Publish selected ref to npm
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify package version
        run: |
          actual_version="$(node -p "require('./package.json').version")"
          if [ "$actual_version" != "${{ inputs.expected_version }}" ]; then
            echo "Expected version ${{ inputs.expected_version }}, got $actual_version" >&2
            exit 1
          fi
        working-directory: packages/electron-messageport-trpc
      - run: npm publish --access public
        working-directory: packages/electron-messageport-trpc
