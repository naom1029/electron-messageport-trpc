version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: "chore(deps)"
    groups:
      trpc:
        patterns:
          - "@trpc/*"
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - "@trpc/*"
          - "electron"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    rebase-strategy: auto
    commit-message:
      prefix: "chore(ci)"
